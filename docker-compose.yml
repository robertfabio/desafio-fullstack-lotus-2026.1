services:
  api:
    build:
      context: ./backend/lotus
      dockerfile: Dockerfile
    container_name: lotus-api
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET:-jwt-test-mudar-para-prod}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_DATASOURCE_URL=jdbc:h2:file:./data/lotustech
    volumes:
      - h2-data:/app/data
    networks:
      - lotus-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/h2-console"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  lotus-network:
    driver: bridge

volumes:
  h2-data:
    driver: local

