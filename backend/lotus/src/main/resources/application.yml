server:
  port: 8080

spring:
  docker:
    compose:
      enabled: false
  datasource:
    url: jdbc:h2:file:./data/lotustech
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: ${JWT_SECRET:jwt-test-mudar-para-prod}
    expiration: 86400000  # 24h em ms

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
